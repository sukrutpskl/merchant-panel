<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NeduNet Merchant Panel - Ürün, sipariş ve stok yönetim paneli" />
  <title>Merchant Panel | NeduNet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <!-- Login Page (shown when not authenticated) -->
  <div id="login-page" class="login-page hidden">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="login-logo">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <rect width="48" height="48" rx="12" fill="url(#logoGrad)" />
              <path d="M14 24L22 32L34 16" stroke="white" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round" />
              <defs>
                <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48">
                  <stop stop-color="#7c3aed" />
                  <stop offset="1" stop-color="#06b6d4" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1>Merchant Panel</h1>
          <p>Mağazanızı yönetmek için giriş yapın</p>
        </div>
        <form id="login-form" autocomplete="on">
          <div class="form-group">
            <label for="login-email">E-posta veya Telefon</label>
            <input type="text" id="login-email" name="phoneOrEmail" placeholder="ornek@email.com" required
              autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="login-password">Şifre</label>
            <div class="password-wrapper">
              <input type="password" id="login-password" name="password" placeholder="••••••••" required
                autocomplete="current-password" />
              <button type="button" class="toggle-password" aria-label="Şifreyi göster">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <div id="login-error" class="form-error hidden"></div>
          <button type="submit" id="login-btn" class="btn btn-primary btn-full">
            <span class="btn-text">Giriş Yap</span>
            <span class="btn-loader hidden">
              <svg class="spinner" width="20" height="20" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none"
                  stroke-dasharray="31.4" stroke-linecap="round">
                  <animateTransform attributeName="transform" type="rotate" dur="1s" from="0 12 12" to="360 12 12"
                    repeatCount="indefinite" />
                </circle>
              </svg>
            </span>
          </button>

          <div class="auth-switch">
            Hesabınız yok mu? <a href="#" id="go-to-register">Mağaza Oluştur</a>
          </div>
        </form>

        <form id="register-form" autocomplete="off" class="hidden">
          <div style="display:flex; gap:12px;">
            <div class="form-group" style="flex:1;">
              <label for="reg-fname">Ad</label>
              <input type="text" id="reg-fname" required />
            </div>
            <div class="form-group" style="flex:1;">
              <label for="reg-lname">Soyad</label>
              <input type="text" id="reg-lname" required />
            </div>
          </div>
          <div class="form-group">
            <label for="reg-email">E-posta</label>
            <input type="email" id="reg-email" required />
          </div>
          <div class="form-group">
            <label for="reg-phone">Telefon</label>
            <input type="tel" id="reg-phone" required />
          </div>
          <div class="form-group">
            <label for="reg-password">Şifre</label>
            <input type="password" id="reg-password" required />
          </div>
          <hr style="border:none; border-top:1px solid var(--border-color); margin:16px 0;" />
          <div class="form-group">
            <label for="reg-mname">Mağaza Adı</label>
            <input type="text" id="reg-mname" required />
          </div>
          <div id="register-error" class="form-error hidden"></div>
          <button type="submit" id="register-btn" class="btn btn-primary btn-full">
            <span class="btn-text">Kayıt Ol</span>
            <span class="btn-loader hidden">
              <svg class="spinner" width="20" height="20" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none"
                  stroke-dasharray="31.4" stroke-linecap="round">
                  <animateTransform attributeName="transform" type="rotate" dur="1s" from="0 12 12" to="360 12 12"
                    repeatCount="indefinite" />
                </circle>
              </svg>
            </span>
          </button>
          <div class="auth-switch">
            Zaten hesabınız var mı? <a href="#" id="go-to-login">Giriş Yap</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Main App (shown when authenticated) -->
  <div id="app" class="app-layout hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="12" fill="url(#sGrad)" />
            <path d="M14 24L22 32L34 16" stroke="white" stroke-width="3" stroke-linecap="round"
              stroke-linejoin="round" />
            <defs>
              <linearGradient id="sGrad" x1="0" y1="0" x2="48" y2="48">
                <stop stop-color="#7c3aed" />
                <stop offset="1" stop-color="#06b6d4" />
              </linearGradient>
            </defs>
          </svg>
          <span class="sidebar-title">NeduNet</span>
        </div>
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Menüyü kapat">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <a href="#/dashboard" class="nav-item" data-page="dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
          </svg>
          <span>Dashboard</span>
        </a>
        <a href="#/products" class="nav-item" data-page="products">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
            <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
            <line x1="12" y1="22.08" x2="12" y2="12" />
          </svg>
          <span>Ürünler</span>
        </a>
        <a href="#/orders" class="nav-item" data-page="orders">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>
          <span>Siparişler</span>
        </a>
        <a href="#/stock" class="nav-item" data-page="stock">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 7h-9" />
            <path d="M14 17H5" />
            <circle cx="17" cy="17" r="3" />
            <circle cx="7" cy="7" r="3" />
          </svg>
          <span>Stok Yönetimi</span>
        </a>
        <a href="#/categories" class="nav-item" data-page="categories">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
          </svg>
          <span>Kategoriler</span>
        </a>
        <a href="#/reports" class="nav-item" data-page="reports">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10" />
            <line x1="12" y1="20" x2="12" y2="4" />
            <line x1="6" y1="20" x2="6" y2="14" />
          </svg>
          <span>Raporlar</span>
        </a>
        <a href="#/profile" class="nav-item" data-page="profile">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
          <span>Ayarlar</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="merchant-info">
          <div class="merchant-avatar" id="merchant-avatar">M</div>
          <div class="merchant-details">
            <span class="merchant-name" id="merchant-name">Mağaza</span>
            <span class="merchant-status" id="merchant-status">Aktif</span>
          </div>
        </div>
        <button id="logout-btn" class="btn btn-logout" title="Çıkış Yap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </aside>

    <!-- Mobile overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Mobile header -->
    <header class="mobile-header">
      <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Menü">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <span class="mobile-title" id="mobile-title">Dashboard</span>
      <div class="mobile-spacer"></div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <!-- Pages will be rendered here -->
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
