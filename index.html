<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NeduNet Merchant Panel - Ürün, sipariş ve stok yönetim paneli" />
  <title>Merchant Panel | NeduNet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <!-- Login Page (shown when not authenticated) -->
  <div id="login-page" class="login-page hidden">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="login-logo">
            <img src="/NEDUBULAR/NDB1.png" alt="NeduNet Logo" style="height: 64px; object-fit: contain;"
              onerror="this.style.display='none'" />
          </div>
          <h1>Merchant Panel</h1>
          <p>Mağazanızı yönetmek için giriş yapın</p>
        </div>
        <form id="login-form" autocomplete="on">
          <div class="form-group">
            <label for="login-email">E-posta veya Telefon</label>
            <input type="text" id="login-email" name="phoneOrEmail" placeholder="ornek@email.com" required
              autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="login-password">Şifre</label>
            <div class="password-wrapper">
              <input type="password" id="login-password" name="password" placeholder="••••••••" required
                autocomplete="current-password" />
              <button type="button" class="toggle-password" aria-label="Şifreyi göster">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <div id="login-error" class="form-error hidden"></div>
          <button type="submit" id="login-btn" class="btn btn-primary btn-full">
            <span class="btn-text">Giriş Yap</span>
            <span class="btn-loader hidden">
              <svg class="spinner" width="20" height="20" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none"
                  stroke-dasharray="31.4" stroke-linecap="round">
                  <animateTransform attributeName="transform" type="rotate" dur="1s" from="0 12 12" to="360 12 12"
                    repeatCount="indefinite" />
                </circle>
              </svg>
            </span>
          </button>

          <div class="auth-switch">
            Hesabınız yok mu? <a href="#" id="go-to-register">Mağaza Oluştur</a>
          </div>
        </form>

        <form id="register-form" autocomplete="off" class="hidden">
          <div style="display:flex; gap:12px;">
            <div class="form-group" style="flex:1;">
              <label for="reg-fname">Ad</label>
              <input type="text" id="reg-fname" required />
            </div>
            <div class="form-group" style="flex:1;">
              <label for="reg-lname">Soyad</label>
              <input type="text" id="reg-lname" required />
            </div>
          </div>
          <div class="form-group">
            <label for="reg-email">E-posta</label>
            <input type="email" id="reg-email" required />
          </div>
          <div class="form-group">
            <label for="reg-phone">Telefon</label>
            <input type="tel" id="reg-phone" required />
          </div>
          <div class="form-group">
            <label for="reg-password">Şifre</label>
            <input type="password" id="reg-password" required />
          </div>
          <hr style="border:none; border-top:1px solid var(--border-color); margin:16px 0;" />
          <div class="form-group">
            <label for="reg-mname">Mağaza Adı</label>
            <input type="text" id="reg-mname" required />
          </div>
          <div id="register-error" class="form-error hidden"></div>
          <button type="submit" id="register-btn" class="btn btn-primary btn-full">
            <span class="btn-text">Kayıt Ol</span>
            <span class="btn-loader hidden">
              <svg class="spinner" width="20" height="20" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none"
                  stroke-dasharray="31.4" stroke-linecap="round">
                  <animateTransform attributeName="transform" type="rotate" dur="1s" from="0 12 12" to="360 12 12"
                    repeatCount="indefinite" />
                </circle>
              </svg>
            </span>
          </button>
          <div class="auth-switch">
            Zaten hesabınız var mı? <a href="#" id="go-to-login">Giriş Yap</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Main App (shown when authenticated) -->
  <div id="app" class="app-layout hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="/NEDUBULAR/NDB2.png" alt="NeduNet Logo" style="height: 32px; object-fit: contain;"
            onerror="this.style.display='none'" />
          <span class="sidebar-title">NeduNet</span>
        </div>
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Menüyü kapat">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <a href="#/dashboard" class="nav-item" data-page="dashboard">
          <img src="/ikoncuklar/EV1.png" alt="Dashboard" style="width: 20px; height: 20px; object-fit: contain;"
            onerror="this.src='/vite.svg'" />
          <span>Dashboard</span>
        </a>
        <a href="#/products" class="nav-item" data-page="products">
          <img src="/ikoncuklar/BU1.png" alt="Ürünler" style="width: 20px; height: 20px; object-fit: contain;"
            onerror="this.style.display='none'" />
          <span>Ürünler</span>
        </a>
        <a href="#/orders" class="nav-item" data-page="orders">
          <img src="/ikoncuklar/SEPET1.png" alt="Siparişler" style="width: 20px; height: 20px; object-fit: contain;"
            onerror="this.style.display='none'" />
          <span>Siparişler</span>
        </a>
        <a href="#/stock" class="nav-item" data-page="stock">
          <img src="/ikoncuklar/BU2.png" alt="Stok" style="width: 20px; height: 20px; object-fit: contain;"
            onerror="this.style.display='none'" />
          <span>Stok Yönetimi</span>
        </a>
        <a href="#/categories" class="nav-item" data-page="categories">
          <img src="/ikoncuklar/BU3.png" alt="Kategoriler" style="width: 20px; height: 20px; object-fit: contain;"
            onerror="this.style.display='none'" />
          <span>Kategoriler</span>
        </a>
        <a href="#/reports" class="nav-item" data-page="reports">
          <img src="/ikoncuklar/ARAMA1.png" alt="Raporlar" style="width: 20px; height: 20px; object-fit: contain;"
            onerror="this.style.display='none'" />
          <span>Raporlar</span>
        </a>
        <a href="#/profile" class="nav-item" data-page="profile">
          <img src="/ikoncuklar/ADAM1.png" alt="Ayarlar" style="width: 20px; height: 20px; object-fit: contain;"
            onerror="this.style.display='none'" />
          <span>Ayarlar</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="merchant-info">
          <div class="merchant-avatar" id="merchant-avatar">M</div>
          <div class="merchant-details">
            <span class="merchant-name" id="merchant-name">Mağaza</span>
            <span class="merchant-status" id="merchant-status">Aktif</span>
          </div>
        </div>
        <button id="logout-btn" class="btn btn-logout" title="Çıkış Yap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </aside>

    <!-- Mobile overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Mobile header -->
    <header class="mobile-header">
      <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Menü">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <span class="mobile-title" id="mobile-title">Dashboard</span>
      <div class="mobile-spacer"></div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <!-- Pages will be rendered here -->
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
